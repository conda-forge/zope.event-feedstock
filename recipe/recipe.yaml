# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "5.1"

package:
  name: zope.event
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/z/zope.event/zope_event-${{ version }}.tar.gz
  sha256: a153660e0c228124655748e990396b9d8295d6e4f546fa1b34f3319e1c666e7f

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}
    # uses `pkg_resources`
    - setuptools

tests:
  - python:
      imports: zope.event
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - 3.13.*
  - requirements:
      run:
        - pytest
        - python ${{ python_min }}
    script:
      - pytest -vv --tb=long --color=yes --pyargs zope.event.tests

about:
  summary: Very basic event publishing system
  license: ZPL-2.1
  license_file:
    - LICENSE.txt
    - COPYRIGHT.txt
  homepage: https://github.com/zopefoundation/zope.event
  documentation: https://zopeevent.readthedocs.io

extra:
  recipe-maintainers:
    - bollwyvl
